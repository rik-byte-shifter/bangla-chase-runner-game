<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Run, jump, and dodge in this hilarious chase game!">
    <meta property="og:title" content="Ma bolse durotto bojay rakhte">
    <meta property="og:description" content="Run, jump, and dodge in this hilarious chase runner game!">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#E67E22">
    <title>Ma bolse durotto bojay rakhte</title>
    <link rel="preload" href="assets/images/poster.png" as="image">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/images/profileoo.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/profileoo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="1200" height="675"></canvas>
        <div id="ui-layer" class="hidden">
            <div id="player-profile" aria-label="Player profile">
                <img id="player-profile-img" src="assets/images/profileoo.png" alt="Player profile">
            </div>
            <div id="score">Score: 0</div>
            <div id="high-score-hud">Best: 0</div>
            <div id="lives" aria-label="Lives"></div>
            <div id="speed-hud">Speed: 100%</div>
            <button type="button" id="mute-btn" aria-label="Toggle sound">🔊</button>
            <button type="button" id="pause-btn" aria-label="Pause">⏸</button>
        </div>
        <div id="start-screen" class="screen active">
            <img class="start-poster-bg" src="assets/images/poster.png" alt="" width="1920" height="1080" decoding="async" fetchpriority="high">
            <div class="start-poster-ui">
                <button type="button" id="play-btn" class="btn-primary start-poster-btn">PLAY</button>
                <button type="button" id="highest-btn" class="btn-secondary start-poster-btn">HIGHEST SCORE</button>
                <p id="start-high-score" class="start-high-toast hidden">HIGH SCORE: <span id="menu-high-score">0</span></p>
            </div>
        </div>
        <div id="intro-screen-2" class="screen intro-screen">
            <img class="intro-bg" src="assets/images/background2.png" alt="" width="1920" height="1080" decoding="async">
            <div class="intro-ui">
                <button type="button" id="intro-next-btn" class="btn-primary intro-btn">NEXT</button>
            </div>
        </div>
        <div id="intro-screen-3" class="screen intro-screen">
            <img class="intro-bg" src="assets/images/background3.png" alt="" width="1920" height="1080" decoding="async">
            <div class="intro-ui">
                <button type="button" id="intro-play-btn" class="btn-primary intro-btn">PLAY</button>
            </div>
        </div>
        <div id="gameover-screen" class="screen">
            <img class="gameover-bg" src="assets/images/endscreen.png" alt="" width="1920" height="1080" decoding="async">
            <div class="gameover-ui">
                <p class="gameover-line">আপনার পাসপোর্ট পাওয়ার দৌড়ে স্কোর: <span id="final-score">0</span></p>
                <p id="achievements-panel" class="gameover-line"></p>
                <button type="button" id="restart-btn" class="btn-primary gameover-btn">PLAY</button>
                <button type="button" id="home-btn" class="btn-secondary gameover-btn">HOME</button>
            </div>
        </div>
        <div id="pause-overlay" class="hidden">
            <p class="title-font">PAUSED</p>
            <p>Press P to resume</p>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>
</body>
</html>
